syntax = "proto3";

package scheduler;

option go_package = "pkg/proto";

// Master service - Workers communicate with Master
service Master {
    rpc RegisterNode(NodeInfo) returns (RegisterResponse);
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
    rpc GetTask(GetTaskRequest) returns (Task);
    rpc ReportTaskStatus(TaskStatusRequest) returns (TaskStatusResponse);
}

// Worker service - Master communicates with Workers
service Worker {
    rpc AssignTask(Task) returns (AssignTaskResponse);
    rpc GetWorkerStatus(StatusRequest) returns (WorkerStatusResponse);
}

// ===== MESSAGES =====

// Resource represents CPU, memory, and disk
message Resource {
    int64 cpu = 1;      // millicores
    int64 memory = 2;   // MB
    int64 disk = 3;     // MB
}

// NodeInfo - Worker sends this to register with Master
message NodeInfo {
    string id = 1;
    string name = 2;
    Resource total = 3;
    string address = 4; 
    map<string, string> labels = 5; // Worker's IP:Port
}

// RegisterResponse - Master responds with registration status
message RegisterResponse {
    bool success = 1;
    string message = 2;
    string node_id = 3;
}

// HeartbeatRequest - Worker sends periodically to report status
message HeartbeatRequest {
    string node_id = 1;
    Resource available = 2;
    repeated string running_tasks = 3;
    bool healthy = 4;
}

// HeartbeatResponse - Master acknowledges heartbeat
message HeartbeatResponse {
    bool accepted = 1;
    string message = 2;
}

// Task - A unit of work
message Task {
    string id = 1;
    string name = 2;
    Resource required = 3;
    string status = 4;  // "pending", "running", "completed", "failed"
    int64 created_at = 5;  // Unix timestamp
    int32 priority = 6;
    map<string, string> node_selector = 7;
}

// GetTaskRequest - Worker asks Master for tasks
message GetTaskRequest {
    string node_id = 1;
}

// TaskStatusRequest - Worker reports task completion
message TaskStatusRequest {
    string node_id = 1;
    string task_id = 2;
    string status = 3;
    string message = 4;
}

// TaskStatusResponse - Master acknowledges task status
message TaskStatusResponse {
    bool accepted = 1;
    string message = 2;
}

// AssignTaskRequest - Master tells Worker to run a task
message AssignTaskResponse {
    bool accepted = 1;
    string message = 2;
}

// StatusRequest - Get worker status
message StatusRequest {
    string node_id = 1;
}

// WorkerStatusResponse - Worker reports its current status
message WorkerStatusResponse {
    string node_id = 1;
    string name = 2;
    Resource available = 3;
    Resource total = 4;
    repeated string running_tasks = 5;
    bool healthy = 6;
    int64 uptime_seconds = 7;
}

// ===== SCHEDULING MESSAGES =====

// SchedulingResult - Result of scheduling decision
message SchedulingResult {
    string task_id = 1;
    string node_id = 2;
    bool success = 3;
    string reason = 4;
    double score = 5;
}

// Empty - For endpoints that don't need parameters
message Empty {
}